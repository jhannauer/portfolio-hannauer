    <script>

    let html = ''
    let km_tot = 0
    for (let conduite of JSON.parse(localStorage.LstExpConduite)) {
        html += `<p>
            Date : ${conduite.ExpDate}, 
            Heure de Début : ${conduite.ExpHeureDep}, 
            Heure de Fin : ${conduite.ExpHeureFin}, 
            Kilomètre : ${conduite.ExpKm},
            Méteo : ${conduite.ExpMeteo},
            Accompagnateur : ${conduite.ExpAccompagnant},
            Fatigue : ${conduite.ExpFatigue},
            Circulation : ${conduite.ExpConduite}
            </p>`;
    }
    km_tot += parseInt(localStorage.km_total);
    document.getElementById('Bilan').innerHTML = html;
    document.getElementById('ExpTotal').innerHTML = km_tot;
